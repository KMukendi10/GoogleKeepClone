<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Keep clone</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" />
  <link rel="icon" href="./Assets/Logo.png" type="image/x-icon" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="topbar">
    <div class="topbar__left">
      <button class="icon-btn" id="menuToggle" data-tooltip="Main menu" aria-label="Toggle sidebar">
        <img src="./Assets/menu.svg" alt="Menu">
      </button>
      <span class="topbar__logo" aria-hidden="true">
        <img src="./Assets/Logo.png" alt="Logo">
      </span>
      <h1 class="topbar__title">Keep</h1>
    </div>

    <div class="topbar__search" id="topbarSearch">
      <button type="button" class="icon-btn search-back-btn" id="searchBackBtn" aria-label="Exit search">
        <span style="font-size: 20px;">←</span> 
      </button>
      <img src="./Assets/search.svg" alt="Search" class="search-lens-icon">
      <label for="searchInput" class="visually-hidden">Search</label>
      <input type="search" id="searchInput" placeholder="Search" autocomplete="off" />
    </div>

    <div class="topbar__right">
      <button type="button" class="icon-btn mobile-search-btn" id="mobileSearchBtn" data-tooltip="Search" aria-label="Search">
        <img src="./Assets/search.svg" alt="Search">
      </button>
      <button class="icon-btn" id="refreshBtn" data-tooltip="Refresh" aria-label="Refresh notes">
        <img src="./Assets/refresh.svg" alt="Refresh">
      </button>
      <button class="icon-btn" id="viewToggleBtn" data-tooltip="List view" aria-label="Toggle list/grid view">
        <img src="./Assets/listview.svg" alt="List View">
      </button>
      <button class="icon-btn" data-tooltip="Settings" aria-label="Settings (placeholder)">
        <img src="./Assets/settings.svg" alt="Settings">
      </button>
      <button class="icon-btn" data-tooltip="Google apps" aria-label="Apps (placeholder)">
        <img src="./Assets/googleapps.svg" alt="">
      </button>
      <span class="topbar__avatar" aria-label="Account" data-tooltip="Account"></span>
    </div>
  </header>

  <div class="layout">
    <nav class="sidebar" id="sidebar" aria-label="Board sections">
      <button class="sidebar__item is-active" data-view="notes" data-tooltip="Notes">
        <img src="./Assets/notes.svg" alt="Notes">
        <span class="sidebar__label">Notes</span>
      </button>
      <button class="sidebar__item" data-view="reminders" data-tooltip="Reminders">
        <img src="./Assets/reminders.svg" alt="Reminders">
        <span class="sidebar__label">Reminders</span>
      </button>
      <button class="sidebar__item" id="editLabelsBtn" data-tooltip="Edit labels">
        <img src="./Assets/edit.svg" alt="Edit labels">
        <span class="sidebar__label">Edit labels</span>
      </button>
      <button class="sidebar__item" data-view="archive" data-tooltip="Archive">
        <img src="./Assets/archive.svg" alt="">
        <span class="sidebar__label">Archive</span>
      </button>
      <button class="sidebar__item" data-view="trash" data-tooltip="Trash">
        <img src="./Assets/delete.svg" alt="Trash">
        <span class="sidebar__label">Trash</span>
      </button>
    </nav>

    <main class="board" id="board">
      <section class="composer" id="composer" aria-label="Create a new note">
        <form id="composerForm" class="composer__form" data-color="default">
          <button type="button" class="icon-btn composer__pin-btn" id="composerPinBtn" data-tooltip="Pin note" aria-pressed="false" aria-label="Pin note">
            <img src="./Assets/pinNote.svg" alt="Pin note">
          </button>
          <input type="text" id="composerTitle" class="composer__title" placeholder="Title" autocomplete="off" />
          <div class="composer__row">
            <textarea id="composerBody" class="composer__body" placeholder="Take a note…" rows="1"></textarea>
            <div class="composer__quick-icons">
              <button type="button" class="icon-btn" id="composerListBtnCollapsed" data-tooltip="New list" aria-label="New checklist">
                <img src="./Assets/newlist.svg" alt="New list">
              </button>
              <button type="button" class="icon-btn" id="composerColorBtnCollapsed" data-tooltip="New note with drawing" aria-label="Note with a drawing">
                <img src="./Assets/newnotedrawing.svg" alt="New Note With Drawing">
              </button>
              <button type="button" class="icon-btn" id="composerImageBtnCollapsed" data-tooltip="New note with image" aria-label="Note with image">
                <img src="./Assets/newnoteimage.svg" alt="New Note With Image">
              </button>
            </div>
          </div>
          <div class="composer__toolbar">
            <div class="composer__quick-actions">
              <button type="button" class="icon-btn" data-tooltip="Text formatting" aria-label="Text formatting">
                <img src="./Assets/formatting.svg" alt="Text formatting">
              </button>
              <button type="button" class="icon-btn" id="composerColorBtn" data-tooltip="Background options" aria-label="Choose note color" aria-haspopup="true" aria-expanded="false">
                <img src="./Assets/backgroundOptions.svg" alt="Background options">
              </button>
              <button type="button" class="icon-btn" id="composerReminderBtn" data-tooltip="Remind me" aria-label="Toggle reminder" aria-pressed="false">
                <img src="./Assets/remindMe.svg" alt="Remind me">
              </button>
              <button type="button" class="icon-btn" data-tooltip="Collaborator" aria-label="Add collaborator">
                <img src="./Assets/collaborator.svg" alt="Collaborator">
              </button>
              <button type="button" class="icon-btn" data-tooltip="Add image" aria-label="Add image">
                <img src="./Assets/addImage.svg" alt="Add image">
              </button>
              <button type="button" class="icon-btn" id="composerArchiveBtn" data-tooltip="Archive" aria-label="Archive this note">
                <img src="./Assets/archive.svg" alt="Archive">
              </button>
              <button type="button" class="icon-btn" data-tooltip="More options" aria-label="More options">
                <img src="./Assets/more.svg" alt="More options">
              </button>
              <button type="button" class="icon-btn" id="composerUndoBtn" data-tooltip="Undo" aria-label="Undo" disabled>
                <img src="./Assets/undo.svg" alt="Undo">
              </button>
              <button type="button" class="icon-btn" id="composerRedoBtn" data-tooltip="Redo" aria-label="Redo" disabled>
                <img src="./Assets/undo.svg" alt="Redo" class="flip-vertical">
              </button>
              <div class="color-popover" id="composerColorPopover" hidden>
                <div class="composer__colors" id="composerColors" role="radiogroup" aria-label="Note color"></div>
              </div>
            </div>
            <div class="composer__actions">
              <button type="button" class="btn btn--text" id="composerCloseBtn">Close</button>
            </div>
          </div>
        </form>
      </section>

      <div class="empty-state" id="emptyState" hidden>
        <img src="./Assets/notes2.svg" alt="empty state illustration">
        <p id="emptyStateText"></p>
      </div>

      <section class="notes-grid" id="notesGrid" aria-live="polite"></section>
    </main>
  </div>

  <template id="noteCardTemplate">
    <article class="note-card" tabindex="0">
      <h3 class="note-card__title"></h3>
      <p class="note-card__body"></p>
      <div class="note-card__footer">
        <time class="note-card__date"></time>
        <div class="note-card__actions">
          <button class="icon-btn note-card__archive" data-tooltip="Archive" aria-label="Archive note">
            <img src="./Assets/archive.svg" alt="Archive">
          </button>
          <button class="icon-btn note-card__unarchive" data-tooltip="Restore" aria-label="Restore note" hidden>
            <img src="./Assets/restore.svg" alt="Restore">
          </button>
          <button class="icon-btn note-card__delete" data-tooltip="Delete" aria-label="Delete note">
            <img src="./Assets/delete.svg" alt="Delete">
          </button>
        </div>
      </div>
    </article>
  </template>

  <div class="modal-overlay" id="modalOverlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitleLabel">
      <input type="text" id="modalTitle" class="modal__title" placeholder="Title" aria-label="Note title" />
      <label id="modalTitleLabel" class="visually-hidden">Edit note</label>
      <textarea id="modalBody" class="modal__body" placeholder="Take a note…" aria-label="Note content"></textarea>
      <div class="modal__toolbar"><div class="modal__meta" id="modalMeta"></div></div>
      <div class="modal__footer">
        <button class="icon-btn" id="modalArchiveBtn" data-tooltip="Archive" aria-label="Archive note"><img src="./Assets/archive.svg" alt="Archive"></button>
        <button class="icon-btn" id="modalRestoreBtn" data-tooltip="Restore" aria-label="Restore note" hidden><img src="./Assets/restore.svg" alt="Restore"></button>
        <button class="icon-btn" id="modalReminderBtn" data-tooltip="Remind me" aria-label="Toggle reminder" aria-pressed="false"><img src="./Assets/remindMe.svg" alt="Remind me"></button>
        <button class="icon-btn" id="modalColorBtn" data-tooltip="Background options" aria-label="Choose note color" aria-haspopup="true" aria-expanded="false"><img src="./Assets/backgroundOptions.svg" alt="Background options"></button>
        <button class="icon-btn" id="modalDeleteBtn" data-tooltip="Delete" aria-label="Delete note"><img src="./Assets/delete.svg" alt="Delete"></button>
        <div class="color-popover color-popover--modal" id="modalColorPopover" hidden><div class="composer__colors" id="modalColors" role="radiogroup" aria-label="Note color"></div></div>
        <button class="btn btn--text" id="modalCloseBtn" style="margin-left:auto;">Close</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="labelsModalOverlay" hidden>
    <div class="modal labels-modal" role="dialog" aria-modal="true" aria-labelledby="labelsModalTitle">
      <h2 id="labelsModalTitle" class="labels-modal__title">Edit labels</h2>
      <form id="labelsForm" class="labels-modal__form">
        <input type="text" id="newLabelInput" placeholder="Create new label" autocomplete="off" maxlength="40" />
        <button type="submit" class="icon-btn" data-tooltip="Add label" aria-label="Add label"><img src="./Assets/label.svg" alt="Add label"></button>
      </form>
      <ul class="labels-modal__list" id="labelsList" aria-label="Your labels"></ul>
      <div class="modal__footer" style="border-top: none;"><button class="btn btn--text" id="labelsModalDoneBtn" style="margin-left:auto;">Done</button></div>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite" hidden><span id="toastMessage"></span><button class="toast__action" id="toastActionBtn"></button></div>

  <script src="script.js"></script>
</body>
</html>
